<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuBlox — Post</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/forum.css">
</head>
<body>
    <nav class="navbar" id="main-navbar">
        <div class="navbar-inner">
            <a href="/" class="logo">
                <img src="/img/logo.svg" alt="TuBlox">
                <span>TuBlox</span>
            </a>
            <div class="nav-links">
                <a href="/home">Home</a>
                <a href="/games">Games</a>
                <a href="/TuForums" class="active">Forums</a>
                <a href="/users">Players</a>
            </div>
            <div class="nav-right">
                <div class="user-menu">
                    <span class="username">Loading...</span>
                    <button class="btn btn-ghost" id="logout-btn">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="forum-page">
        <div class="post-container" id="post-container">
            <div class="loading">Loading post...</div>
        </div>

        <div class="replies-section" id="replies-section" style="display:none;">
            <h3>Replies</h3>
            <div class="reply-form" id="reply-form">
                <textarea id="reply-content" placeholder="Write a reply..." maxlength="2000"></textarea>
                <button class="btn btn-primary" onclick="postReply()">Reply</button>
            </div>
            <div class="replies-list" id="replies-list"></div>
        </div>
    </div>

    <script src="/js/main.js"></script>
    <script src="/js/forum.js"></script>
</body>
</html>
