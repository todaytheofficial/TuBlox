<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuBlox</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="/" class="logo">
                <img src="/img/logo.svg" alt="TuBlox">
                <span>TuBlox</span>
            </a>
            <a href="/auth" class="btn btn-primary">Play</a>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <span class="hero-badge">v0.1.0</span>
            <h1>Build your world</h1>
            <p>Create, explore, and share with players worldwide.</p>
            <div class="hero-buttons">
                <a href="/auth" class="btn btn-primary btn-lg">
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                        <polygon points="5 3 19 12 5 21 5 3"/>
                    </svg>
                    Start Playing
                </a>
                <a href="#features" class="btn btn-secondary btn-lg">Learn More</a>
            </div>
        </div>
    </section>

    <section class="features" id="features">
        <h2>Features</h2>
        <div class="features-grid">
            <div class="card feature">
                <div class="feature-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                    </svg>
                </div>
                <h3>Build Anything</h3>
                <p>Create anything you can imagine.</p>
            </div>
            <div class="card feature">
                <div class="feature-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="2" y1="12" x2="22" y2="12"/>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    </svg>
                </div>
                <h3>Open World</h3>
                <p>Explore infinite procedural worlds.</p>
            </div>
            <div class="card feature">
                <div class="feature-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                </div>
                <h3>Multiplayer</h3>
                <p>Play with friends online.</p>
            </div>
            <div class="card feature">
                <div class="feature-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                    </svg>
                </div>
                <h3>Fast</h3>
                <p>Optimized for any hardware.</p>
            </div>
        </div>
    </section>
    

    <script src="/js/main.js"></script>
</body>
</html>
