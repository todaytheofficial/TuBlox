<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuBlox — Forums</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/forum.css">
</head>
<body>
    <nav class="navbar" id="main-navbar">
        <div class="navbar-inner">
            <a href="/" class="logo">
                <img src="/img/logo.svg" alt="TuBlox">
                <span>TuBlox</span>
            </a>
            <div class="nav-right">

            </div>
        </div>
    </nav>

    <div class="forum-page">
        <div class="forum-header">
            <h1>TuForums</h1>
            <p>Discuss, share, and connect with the community</p>
            <button class="btn btn-primary" onclick="openNewPostModal()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                New Post
            </button>
        </div>

        <div class="forum-container">
            <aside class="forum-sidebar">
                <div class="forum-categories">
                    <h3>Categories</h3>
                    <div class="category-list" id="category-list">
                        <div class="category-item active" data-category="all">
                            <span class="category-icon">📋</span>
                            <span class="category-name">All Posts</span>
                        </div>
                    </div>
                </div>
                
                <div class="forum-filters">
                    <h3>Sort By</h3>
                    <select id="sort-select" onchange="loadPosts()">
                        <option value="newest">Newest</option>
                        <option value="popular">Most Viewed</option>
                        <option value="mostliked">Most Liked</option>
                        <option value="mostreplies">Most Replies</option>
                        <option value="oldest">Oldest</option>
                    </select>
                </div>
            </aside>

            <main class="forum-main">
                <div class="forum-search">
                    <input type="text" id="search-input" placeholder="Search posts..." onkeyup="handleSearch(event)">
                    <button class="btn btn-secondary" onclick="loadPosts()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="m21 21-4.35-4.35"/>
                        </svg>
                    </button>
                </div>

                <div class="posts-list" id="posts-list">
                    <div class="loading">Loading posts...</div>
                </div>

                <div class="forum-pagination" id="pagination"></div>
            </main>
        </div>
    </div>

    <!-- New Post Modal -->
    <div class="modal" id="new-post-modal">
        <div class="modal-backdrop" onclick="closeNewPostModal()"></div>
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2>Create New Post</h2>
                <button class="modal-close" onclick="closeNewPostModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="post-title">Title</label>
                    <input type="text" id="post-title" maxlength="100" placeholder="Enter post title...">
                    <span class="char-count"><span id="title-count">0</span>/100</span>
                </div>
                <div class="form-group">
                    <label for="post-category">Category</label>
                    <select id="post-category"></select>
                </div>
                <div class="form-group">
                    <label for="post-content">Content</label>
                    <textarea id="post-content" maxlength="5000" placeholder="Write your post..."></textarea>
                    <span class="char-count"><span id="content-count">0</span>/5000</span>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeNewPostModal()">Cancel</button>
                <button class="btn btn-primary" onclick="createPost()">Post</button>
            </div>
        </div>
    </div>

    <script src="/js/main.js"></script>
    <script src="/js/forum.js"></script>
</body>
</html>
