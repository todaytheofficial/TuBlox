<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servers - TUBLOX</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .servers-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 100px 24px 48px;
        }
        
        .servers-header {
            margin-bottom: 32px;
        }
        
        .servers-header h1 {
            margin-bottom: 8px;
        }
        
        .server-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 12px;
            transition: all 0.2s;
        }
        
        .server-card:hover {
            border-color: var(--border-light);
            transform: translateY(-2px);
        }
        
        .server-status {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #00ff88;
            box-shadow: 0 0 10px #00ff8855;
            flex-shrink: 0;
        }
        
        .server-status.offline {
            background: #666;
            box-shadow: none;
        }
        
        .server-info {
            flex: 1;
        }
        
        .server-name {
            font-family: 'Sora', sans-serif;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .server-host {
            font-size: 13px;
            color: var(--gray);
            font-family: monospace;
        }
        
        .server-players {
            text-align: right;
        }
        
        .players-count {
            font-family: 'Sora', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--white);
        }
        
        .players-label {
            font-size: 12px;
            color: var(--gray);
        }
        
        .no-servers {
            text-align: center;
            padding: 60px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
        }
        
        .no-servers h3 {
            margin-bottom: 8px;
            color: var(--gray);
        }
        
        .launch-guide {
            margin-top: 40px;
            padding: 28px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
        }
        
        .launch-guide h3 {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .step {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        
        .step:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        
        .step-num {
            width: 32px;
            height: 32px;
            background: var(--white);
            color: var(--bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        .step-content h4 {
            margin-bottom: 8px;
            font-size: 15px;
        }
        
        .step-content p {
            color: var(--gray);
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .step-content code {
            display: inline-block;
            padding: 8px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: 'Consolas', monospace;
            font-size: 13px;
        }
        
        .refresh-btn {
            padding: 8px 16px;
            font-size: 13px;
        }
        
        .last-update {
            font-size: 12px;
            color: var(--gray-dark);
            margin-left: auto;
        }
        
        .servers-toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="/" class="logo">
                <span>TUBLOX</span>
            </a>
            <div class="nav-right">
                <a href="/home" class="btn btn-ghost">Home</a>
                <a href="/users" class="btn btn-ghost">Players</a>
            </div>
        </div>
    </nav>

    <main class="servers-content">
        <div class="servers-header">
            <h1>Game Servers</h1>
            <p style="color: var(--gray);">Find a server or host your own</p>
        </div>
        
        <div class="servers-toolbar">
            <button class="btn btn-secondary refresh-btn" onclick="loadServers()">
                ↻ Refresh
            </button>
            <span class="last-update" id="last-update"></span>
        </div>

        <div id="servers-list">
            <div class="loading-spinner"></div>
        </div>

        <div class="launch-guide">
            <h3>🚀 Quick Start Guide</h3>
            
            <div class="step">
                <div class="step-num">1</div>
                <div class="step-content">
                    <h4>Start the Server</h4>
                    <p>Open a terminal and run:</p>
                    <code>TuBloxServer.exe</code>
                </div>
            </div>
            
            <div class="step">
                <div class="step-num">2</div>
                <div class="step-content">
                    <h4>Start the Game</h4>
                    <p>Open another terminal and run:</p>
                    <code>TuBlox.exe</code>
                </div>
            </div>
            
            <div class="step">
                <div class="step-num">3</div>
                <div class="step-content">
                    <h4>Play with Friends</h4>
                    <p>Each player runs TuBlox.exe with their name:</p>
                    <code>TuBlox.exe MyName</code>
                </div>
            </div>
        </div>
    </main>

    <script>
        let lastUpdate = null;
        
        async function loadServers() {
            const list = document.getElementById('servers-list');
            const updateEl = document.getElementById('last-update');
            
            try {
                const res = await fetch('/api/servers');
                const data = await res.json();
                
                lastUpdate = new Date();
                updateEl.textContent = 'Updated: ' + lastUpdate.toLocaleTimeString();
                
                if (data.success && data.servers.length > 0) {
                    list.innerHTML = data.servers.map(s => `
                        <div class="server-card">
                            <div class="server-status ${s.online !== false ? '' : 'offline'}"></div>
                            <div class="server-info">
                                <div class="server-name">${escapeHtml(s.name)}</div>
                                <div class="server-host">${s.host}:${s.port}</div>
                            </div>
                            <div class="server-players">
                                <div class="players-count">${s.players}</div>
                                <div class="players-label">/ ${s.maxPlayers} players</div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = `
                        <div class="no-servers">
                            <h3>No servers online</h3>
                            <p style="color: var(--gray-dark)">Start TuBloxServer.exe to create one!</p>
                        </div>
                    `;
                }
            } catch (e) {
                console.error(e);
                list.innerHTML = `
                    <div class="no-servers">
                        <h3>Connection Error</h3>
                        <p style="color: var(--gray-dark)">Could not load servers</p>
                    </div>
                `;
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Загружаем при старте
        loadServers();
        
        // Обновляем каждые 5 секунд
        setInterval(loadServers, 5000);
    </script>
</body>
</html>
