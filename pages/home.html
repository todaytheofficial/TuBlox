<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuBlox — Home</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="/home" class="logo">
                <img src="/img/logo.svg" alt="TuBlox">
                <span>TuBlox</span>
            </a>
            <div class="nav-right">
                <a href="/games" class="btn btn-ghost">Games</a>
                <a href="/users" class="btn btn-ghost">Players</a>
                <span class="nav-user"><strong class="username">Player</strong> <span class="odil-id">#0</span></span>
                <button id="logout-btn" class="btn btn-ghost">Sign Out</button>
            </div>
        </div>
    </nav>

    <div class="home-page">
        <div class="home-content">
            <!-- Welcome -->
            <div class="welcome">
                <h1>Welcome, <span class="username">Player</span></h1>
                <p>ID: <strong class="odil-id">#0</strong></p>
            </div>

            <!-- Stats -->
            <div class="stats">
                <div class="card stat">
                    <div class="stat-value" id="user-level">1</div>
                    <div class="stat-label">Level</div>
                </div>
                <div class="card stat">
                    <div class="stat-value" id="user-coins">0</div>
                    <div class="stat-label">Coins</div>
                </div>
                <div class="card stat">
                    <div class="stat-value" id="user-playtime">0h</div>
                    <div class="stat-label">Time</div>
                </div>
            </div>

            <!-- Featured Game -->
            <div class="section">
                <div class="section-header">
                    <h2>Featured Game</h2>
                    <a href="/games" class="btn btn-ghost btn-sm">View All</a>
                </div>
                <div class="featured-game-container" id="featured-game">
                    <div class="loading-placeholder">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/main.js"></script>
</body>
</html>
