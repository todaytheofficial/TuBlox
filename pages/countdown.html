<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuBlox — Coming Soon</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="countdown-page">
        <div class="countdown-content">
            <a href="/" class="logo">
                <img src="/img/logo.svg" alt="TuBlox">
                <span>TuBlox</span>
            </a>
            
            <h1>Coming Soon</h1>
            <p>We're working hard to bring you something amazing.</p>
            
            <div class="countdown">
                <div class="countdown-timer" id="countdown">
                    <div class="countdown-item">
                        <span class="countdown-value" id="days">00</span>
                        <span class="countdown-label">days</span>
                    </div>
                    <div class="countdown-item">
                        <span class="countdown-value" id="hours">00</span>
                        <span class="countdown-label">hours</span>
                    </div>
                    <div class="countdown-item">
                        <span class="countdown-value" id="minutes">00</span>
                        <span class="countdown-label">min</span>
                    </div>
                    <div class="countdown-item">
                        <span class="countdown-value" id="seconds">00</span>
                        <span class="countdown-label">sec</span>
                    </div>
                </div>
            </div>
            
            <div class="countdown-date">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                    <line x1="16" y1="2" x2="16" y2="6"/>
                    <line x1="8" y1="2" x2="8" y2="6"/>
                    <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                <span>March 2, 2026 at 3:00 PM MSK</span>
            </div>
            
            <a href="/auth" class="btn btn-primary btn-lg">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                Create Account
            </a>
            
            <p class="countdown-note">Create your account now to be ready on launch day</p>
        </div>
    </div>

    <script src="/js/main.js"></script>
</body>
</html>
